version: "3.9"

services:
  webrtc-video-chat:
    build: .
    container_name: webrtc-video-chat

    ports:
      - "3000:3000"

    env_file:
      - .env

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:3000/api/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped